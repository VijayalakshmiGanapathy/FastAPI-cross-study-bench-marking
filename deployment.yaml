apiVersion: apps/v1

kind: Deployment

metadata:
  name: fastapi-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fastapi-app

  template:

    metadata:
      labels:
        app: fastapi-app

    spec:

      containers:

      - name: fastapi-container

        image: vijayalakshmiganapathy/fastapi-assessment:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 8000